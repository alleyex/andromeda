<h2>My Items</h2>
<ul class="items">
  <!-- <li *ngFor="let item of items" [class.selected]="item === selectedItem" (click)="onSelect(item)"> -->
  <li *ngFor="let item of items$ | async" [class.selected]="item.id === selectedId">
    <a [routerLink]="['/item', item.id]">
      <span class="badge">{{item.id}}</span> {{item.name}}
    </a>
  </li>
</ul>

<app-header-detail [item]="selectedItem"></app-header-detail>
