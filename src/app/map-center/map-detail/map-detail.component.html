<div *ngIf="map$ | async as map">
    <h2>{{map.name | uppercase}} Details</h2>
    <div><span>id: </span>{{map.id}}</div>
    <div>
      <label>name:
        <input [(ngModel)]="map.name" placeholder="name"/>
      </label>
    </div>
    <p>
      <button (click)="gotoItems(map)">Back</button>
    </p>
</div>
